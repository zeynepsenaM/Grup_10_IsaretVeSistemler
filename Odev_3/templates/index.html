<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Voice Analytics Studio | BIL216</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #58a6ff; --success: #3fb950; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 25px; }
        .dashboard { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        .control-panel { background: var(--card); border-radius: 16px; padding: 30px; border: 1px solid #30363d; height: fit-content; position: sticky; top: 25px; }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        .select-box { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: var(--text); border-radius: 8px; cursor: pointer; }
        .analyze-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px; }
        audio { width: 100%; margin: 10px 0 20px 0; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .stat-card { background: #0d1117; padding: 15px; border-radius: 10px; margin-top: 12px; border: 1px solid #30363d; }
        .stat-val { font-size: 20px; font-weight: bold; display: block; }
        .chart-container { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #30363d; margin-bottom: 20px; height: 280px; }
        .audio-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="control-panel">
            <h2>Analiz Merkezi</h2>
            <div class="audio-label">Dosya Seçimi</div>
            <select id="fileSelect" class="select-box"></select>
            <div class="audio-label" style="margin-top:15px;">Orijinal Kayıt</div>
            <audio id="audioPlayer" controls></audio>
            <button id="runBtn" class="analyze-btn">ANALİZİ BAŞLAT</button>
            
            <div id="results" style="display:none">
                <div class="stat-card"><small>Orijinal Süre</small><span id="origDur" class="stat-val"></span></div>
                <div class="stat-card"><small>Sıkıştırma Oranı</small><span id="ratio" class="stat-val" style="color:var(--success)"></span></div>
                <div class="stat-card"><small>Net Konuşma</small><span id="cleanDur" class="stat-val"></span></div>
                
                <div id="outputArea" style="margin-top:25px; border-top: 1px solid #30363d; padding-top:20px;">
                    <div class="audio-label" style="color:var(--success)">✅ Temizlenmiş Kayıt</div>
                    <audio id="cleanAudioPlayer" controls></audio>
                </div>
            </div>
        </div>
        <div class="main-content">
            <div class="chart-container"><canvas id="cVAD"></canvas></div>
            <div class="chart-container"><canvas id="cE"></canvas></div>
            <div class="chart-container"><canvas id="cZ"></canvas></div>
        </div>
    </div>
    <script>
        let charts = {};
        const audio = document.getElementById('audioPlayer');
        const cleanAudio = document.getElementById('cleanAudioPlayer');
        const select = document.getElementById('fileSelect');

        select.onchange = () => { audio.src = `/get_audio/${select.value}`; audio.load(); };

        async function loadFiles() {
            const res = await fetch('/list_files');
            const files = await res.json();
            select.innerHTML = '';
            files.forEach(f => {
                let opt = document.createElement('option');
                opt.value = opt.innerHTML = f;
                select.appendChild(opt);
            });
            if(files.length > 0) audio.src = `/get_audio/${files[0]}`;
        }

        const draw = (id, label, y, labels, color, type='line', bg=null) => {
            if(charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: type,
                data: { 
                    labels: labels, 
                    datasets: [{ 
                        label: label, data: y, borderColor: color, backgroundColor: bg || 'rgba(88,166,255,0.1)', 
                        fill: true, pointRadius: 0, borderWidth: 1.5, barPercentage: 1.0, categoryPercentage: 1.0
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { title: { display: true, text: label, color: '#c9d1d9' }, legend: { display: false } }, 
                    scales: { 
                        x: { display: true, title: { display: true, text: 'Zaman (saniye)', color: '#8b949e' }, ticks: { color: '#8b949e', maxTicksLimit: 12 } }, 
                        y: { display: true, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } } 
                    } 
                }
            });
        };

        document.getElementById('runBtn').onclick = async () => {
            const res = await fetch(`/analyze/${select.value}`);
            const data = await res.json();
            document.getElementById('results').style.display = 'block';
            document.getElementById('origDur').innerText = data.orig_dur + " s";
            document.getElementById('ratio').innerText = "%" + data.ratio;
            document.getElementById('cleanDur').innerText = data.clean_dur + " s";

            if(data.cleaned_file) {
                cleanAudio.src = `/get_audio/${data.cleaned_file}?t=` + new Date().getTime(); // Cache engelleme
                cleanAudio.load();
            }

            draw('cVAD', 'VAD (SESLİ/SESSİZ)', data.labels.map(()=>1), data.labels, null, 'bar', data.colors);
            draw('cE', 'ENERJİ (STE)', data.energies, data.labels, '#58a6ff');
            draw('cZ', 'ZCR', data.zcrs, data.labels, '#bc8cff');
        };
        window.onload = loadFiles;
    </script>
</body>
</html>
